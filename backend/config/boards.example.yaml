# config/boards.example.yaml
#
# Annotated template for boards.yaml.
# Copy this file to boards.yaml and edit the boards list to match your deployment.
#
# YAML structure: a top-level `boards` list where each entry defines one Jira board,
# and an optional top-level `jira:` stanza that controls which Jira custom field IDs
# are used for story points and JPD delivery links.
#
# Field reference — boards list:
#
#   boardId (required)
#     The Jira project key for this board (e.g. ACC, PLAT).
#     Must be unique within the file. Normalised to UPPERCASE on load.
#
#   boardType (required)
#     Board type: "scrum" (sprint-based) or "kanban" (flow-based).
#     Planning accuracy reports are unavailable for kanban boards.
#
#   doneStatusNames (optional)
#     Status names that count as "completed" for DORA deployment detection and
#     lead-time calculation. Default: ["Done", "Closed", "Released"]
#
#   inProgressStatusNames (optional)
#     Status names that mark the start of active work (cycle-time start event).
#     Default: ["In Progress"]
#
#   cancelledStatusNames (optional)
#     Status names for cancelled/abandoned issues. These are excluded from
#     roadmap coverage calculations. Default: ["Cancelled", "Won't Do"]
#
#   failureIssueTypes (optional)
#     Issue types counted as failures for Change Failure Rate (CFR).
#     Default: ["Bug", "Incident"]
#
#   failureLinkTypes (optional)
#     Issue link types that indicate a deployment failure relationship.
#     Default: ["is caused by", "caused by"]
#
#   failureLabels (optional)
#     Jira labels that mark an issue as a deployment failure.
#     Default: ["regression", "incident", "hotfix"]
#
#   incidentIssueTypes (optional)
#     Issue types counted as production incidents for MTTR calculation.
#     Default: ["Bug", "Incident"]
#
#   recoveryStatusNames (optional)
#     Status names that mark recovery from an incident (MTTR end event).
#     Default: ["Done", "Resolved"]
#
#   incidentLabels (optional)
#     Labels that additionally mark an issue as a production incident.
#     Default: []
#
#   incidentPriorities (optional)
#     Issue priorities that qualify an issue as a production incident.
#     Default: ["Critical"]
#
#   backlogStatusIds (optional)
#     Status IDs (not names) representing the pre-board backlog state for
#     Kanban boards. Issues with a current statusId in this list are excluded
#     from flow metrics. When empty, the fallback heuristic is used (any issue
#     with no status changelog is treated as backlog). Default: []
#
#   dataStartDate (optional)
#     ISO date string (YYYY-MM-DD) or null. Hard lower bound for Kanban flow
#     metrics — issues whose board-entry date is before this date are excluded.
#     Null means no lower bound. Default: null
#
# Field reference — jira: stanza (optional, top-level):
#
#   storyPointsFieldIds (optional)
#     List of Jira custom field IDs to try when reading story point estimates
#     from issues. The first non-null value found is used. Jira tenants use
#     different field IDs depending on how story points were configured.
#     To find your IDs, fetch any issue via the Jira API and look for fields
#     whose value is a number and whose key looks like "customfield_XXXXX".
#     Default: ["story_points", "customfield_10016", "customfield_10026",
#     "customfield_10028", "customfield_11031"]
#
#   epicLinkFieldId (optional)
#     Custom field ID used to store the parent Epic key on issues that pre-date
#     Jira's native parent field (older "Epic Link" field type). Set to null to
#     disable Epic Link field reading and rely solely on the parent field.
#     Default: "customfield_10014"
#
#   jpdDeliveryLinkInward (optional)
#     Inward link type name(s) for JPD delivery links. Accepts a bare string or
#     a list. These are the names that appear on an issue when it is the target
#     of a delivery relationship. Used when syncing JPD ideas to identify which
#     delivery epics are linked to each idea.
#     Default: ["is implemented by", "is delivered by"]
#
#   jpdDeliveryLinkOutward (optional)
#     Outward link type name(s) for JPD delivery links. Accepts a bare string or
#     a list. Used symmetrically with jpdDeliveryLinkInward.
#     Default: ["implements", "delivers"]

boards:
  # --- Scrum board example ---
  - boardId: ACC
    boardType: scrum
    doneStatusNames:
      - Done
      - Closed
      - Released
    inProgressStatusNames:
      - In Progress
      - In Development
    cancelledStatusNames:
      - Cancelled
      - "Won't Do"
    failureIssueTypes:
      - Bug
      - Incident
    failureLinkTypes:
      - "is caused by"
      - "caused by"
    failureLabels:
      - regression
      - incident
      - hotfix
    incidentIssueTypes:
      - Bug
      - Incident
    recoveryStatusNames:
      - Done
      - Resolved
    incidentLabels: []
    incidentPriorities:
      - Critical
    backlogStatusIds: []
    dataStartDate: null

  # --- Kanban board example ---
  - boardId: PLAT
    boardType: kanban
    doneStatusNames:
      - Done
      - Released
    inProgressStatusNames:
      - In Progress
    cancelledStatusNames:
      - Cancelled
    failureIssueTypes:
      - Bug
    failureLinkTypes:
      - "is caused by"
    failureLabels:
      - regression
    incidentIssueTypes:
      - Bug
    recoveryStatusNames:
      - Done
    incidentLabels: []
    incidentPriorities:
      - Critical
    # Backlog status ID from Jira — issues in this status are pre-board
    backlogStatusIds:
      - "10303"
    # Only include issues that entered the board from 2024 onwards
    dataStartDate: "2024-01-01"

# --- Optional: Jira custom field IDs ---
# Uncomment and edit this stanza to override the default Jira field mappings.
# All fields are optional; omit any field to keep its current database value.
# Only the fields listed here will be written to the database on startup.
#
# jira:
#   # Story point field IDs — list all variants used in your Jira instance.
#   # Fragile tries each in order and uses the first non-null value.
#   storyPointsFieldIds:
#     - story_points        # legacy Jira Server / some older cloud projects
#     - customfield_10016   # "Story point estimate" (classic projects)
#     - customfield_10026   # "Story Points" (classic projects, older)
#     - customfield_10028   # "Story Points" (some cloud instances)
#     - customfield_11031   # "Story point estimate" (team-managed / next-gen)
#
#   # Epic Link custom field — used for pre-parent-field epic relationships.
#   # Set to null to disable and rely solely on the native parent field.
#   epicLinkFieldId: customfield_10014
#
#   # JPD delivery link type names — must match exactly what Jira shows on
#   # the issue link panel. Check by opening any delivery-linked issue.
#   # Accepts a bare string or a list.
#   jpdDeliveryLinkInward:
#     - "is implemented by"
#     - "is delivered by"
#   jpdDeliveryLinkOutward:
#     - "implements"
#     - "delivers"

